<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-4">Register</h5>
          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" formControlName="firstName"
                  [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }">
              </div>
              <div class="col-md-6 mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" formControlName="lastName"
                  [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }">
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" formControlName="email"
                [ngClass]="{ 'is-invalid': submitted && f['email'].errors }">
            </div>

            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" formControlName="username"
                [ngClass]="{ 'is-invalid': submitted && f['username'].errors }">
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" formControlName="password"
                  [ngClass]="{ 'is-invalid': submitted && f['password'].errors }">
              </div>
              <div class="col-md-6 mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" formControlName="confirmPassword"
                  [ngClass]="{ 'is-invalid': submitted && (f['confirmPassword'].errors || (submitted && registerForm.errors?.['passwordMismatch'])) }">
              </div>
            </div>

            <div class="mb-3">
              <label for="phoneNumber" class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="phoneNumber" formControlName="phoneNumber"
                [ngClass]="{ 'is-invalid': submitted && f['phoneNumber'].errors }">
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              Register
            </button>
          </form>
          <p class="mt-3 text-center">Already have an account? <a routerLink="/auth/login">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
