<div class="chat-container">
  <div class="chat-header">
    <h5>Live Chat Support</h5>
    <div class="status" [ngClass]="{ 'online': connected }"></div>
  </div>

  <div class="messages-container">
    <div *ngFor="let msg of messages" class="message" [ngClass]="{ 'user': msg.sender === 'User', 'system': msg.sender === 'System' }">
      <div class="message-bubble">
        <strong>{{ msg.sender }}:</strong>
        <p>{{ msg.message }}</p>
        <small>{{ msg.timestamp | date:'short' }}</small>
      </div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-group">
      <input type="text" class="form-control" placeholder="Type your message..." [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()">
      <button class="btn btn-primary" (click)="sendMessage()">Send</button>
    </div>
  </div>
</div>
